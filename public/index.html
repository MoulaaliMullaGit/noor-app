<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noor — Read. Reflect. Return.</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0A1628;
      color: #F5ECD7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(201, 169, 110, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .arabic-name {
      font-family: 'Amiri', serif;
      font-size: 3.5rem;
      color: #C9A96E;
      margin-bottom: 0.25rem;
      letter-spacing: 2px;
    }

    .app-name {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #F5ECD7, #C9A96E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 4px;
      color: #C9A96E;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    .description {
      max-width: 520px;
      font-size: 1.1rem;
      line-height: 1.8;
      color: rgba(245, 236, 215, 0.7);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .badge {
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid rgba(201, 169, 110, 0.4);
      border-radius: 50px;
      font-size: 0.9rem;
      color: #C9A96E;
      letter-spacing: 2px;
      font-weight: 400;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #C9A96E;
      margin: 2rem auto;
      opacity: 0.4;
    }

    .verse {
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: rgba(201, 169, 110, 0.6);
      max-width: 500px;
      line-height: 2;
      direction: rtl;
    }

    .verse-ref {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      color: rgba(245, 236, 215, 0.35);
      margin-top: 0.75rem;
      letter-spacing: 1px;
    }

    .geometric {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 1px solid rgba(201, 169, 110, 0.06);
      border-radius: 50%;
      pointer-events: none;
    }
    .geometric:nth-child(1) { top: -100px; right: -100px; }
    .geometric:nth-child(2) { bottom: -80px; left: -80px; width: 250px; height: 250px; }
    .geometric:nth-child(3) { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; }
  </style>
</head>
<body>
  <div class="geometric"></div>
  <div class="geometric"></div>
  <div class="geometric"></div>

  <div class="arabic-name">نُور</div>
  <h1 class="app-name">Noor</h1>
  <p class="subtitle">Read · Reflect · Return</p>
  <p class="description">
    Your daily Quran companion. Build a lasting relationship with the Quran through 
    adaptive daily reading, personal reflections, and meaningful streaks.
  </p>
  <span class="badge">Coming Soon</span>

  <div class="divider"></div>

  <p class="verse">
    قَدْ جَاءَكُم مِّنَ اللَّهِ نُورٌ وَكِتَابٌ مُّبِينٌ
  </p>
  <p class="verse-ref">Surah Al-Ma'idah 5:15</p>
</body>
</html>
